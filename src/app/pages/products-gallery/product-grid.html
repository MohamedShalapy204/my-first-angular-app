<!-- Search Bar -->
<div class="mb-unit lg:mb-6 w-full relative">
  <div class="relative flex items-center group">
    <span class="material-symbols-outlined absolute left-4 text-on-surface-variant/50 group-focus-within:text-primary transition-colors">search</span>
    <input type="text" placeholder="Search our collection..."
      class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-base transition-all placeholder:text-on-surface-variant/40">
  </div>
</div>

<!-- Product Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-section-gap">
  @for (product of products; track product.id) {
    <app-product-card
      [product]="product"
      [wide]="product.span === 'wide'"
    />
  }
</div>

<!-- Pagination -->
<app-pagination />
