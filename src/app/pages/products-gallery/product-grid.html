<!-- Product Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-section-gap">
  @for (product of products(); track product.id) {
    <app-product-card
      [product]="product"
    />
  }
</div>

<!-- Pagination -->
<nav class="flex justify-center items-center gap-4 mt-section-gap">
  <!-- Previous -->
  <button
    class="w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant hover:bg-primary-container hover:text-white transition-all"
    (click)="prevPage()"
    [disabled]="currentPage() === 1"
  >
    <span class="material-symbols-outlined text-[18px]">chevron_left</span>
  </button>

  <!-- Page Numbers -->
  <button
    class="text-sm px-4 h-10 flex items-center transition-colors"
    [class]="currentPage() === 1 ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:text-primary'"
    (click)="goToPage(1)"
  >
    1
  </button>
  <button
    class="text-sm px-4 h-10 flex items-center transition-colors"
    [class]="currentPage() === 2 ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:text-primary'"
    (click)="goToPage(2)"
  >
    2
  </button>
  <button
    class="text-sm px-4 h-10 flex items-center transition-colors"
    [class]="currentPage() === 3 ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:text-primary'"
    (click)="goToPage(3)"
  >
    3
  </button>
  <span class="text-on-surface-variant px-2">...</span>
  <button
    class="text-sm px-4 h-10 flex items-center transition-colors"
    [class]="currentPage() === 8 ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant hover:text-primary'"
    (click)="goToPage(8)"
  >
    8
  </button>

  <!-- Next -->
  <button
    class="w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant text-on-surface-variant hover:bg-primary-container hover:text-white transition-all"
    (click)="nextPage()"
    [disabled]="currentPage() === totalPages"
  >
    <span class="material-symbols-outlined text-[18px]">chevron_right</span>
  </button>
</nav>
