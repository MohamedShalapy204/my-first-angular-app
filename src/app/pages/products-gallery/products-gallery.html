<main class="max-w-[1440px] mx-auto px-padding-desktop py-section-gap">
  <!-- Hero Section -->
  <section class="mb-section-gap max-w-3xl">
    <h1 class="text-display-lg font-display mb-unit">{{ translate('gallery.title') }}</h1>
    <p class="text-lg text-on-surface-variant">{{ translate('gallery.description') }}</p>
  </section>

  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Sidebar Filtering -->
    <app-sidebar-filter
      class="w-full lg:w-1/4 mb-6 lg:mb-0"
      [categories]="categories"
      (categoryChange)="onCategoryChange($event)"
      (priceChange)="onPriceChange($event)"
      (sortChange)="onSortChange($event)"
    />

    <!-- Product Grid -->
    <div class="w-full lg:w-3/4">
      <!-- Search Bar -->
      <div class="mb-unit lg:mb-6 w-full relative">
        <div class="relative flex items-center group">
          <span class="material-symbols-outlined absolute left-4 text-on-surface-variant/50 group-focus-within:text-primary transition-colors">search</span>
          <input type="text" placeholder="Search our collection..."
            class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-base transition-all placeholder:text-on-surface-variant/40"
            (input)="onSearchChange($any($event.target).value)">
        </div>
      </div>

      <app-product-grid [products]="filteredProducts()" />
    </div>
  </div>
</main>
