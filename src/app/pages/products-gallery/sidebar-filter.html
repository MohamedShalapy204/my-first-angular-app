<aside class="sticky-filter space-y-6" style="position: sticky; top: 100px;">
  <!-- Category -->
  <div>
    <h3 class="text-xs uppercase tracking-widest text-on-surface-variant mb-unit">Category</h3>
    <ul class="space-y-2">
      <li>
        <button
          class="text-base transition-colors"
          [class]="activeCategoryId() === null ? 'text-primary font-semibold' : 'text-on-surface-variant hover:text-primary'"
          (click)="setCategory(null)"
        >
          All Products
        </button>
      </li>
      @for (cat of categories(); track cat.id) {
        <li>
          <button
            class="text-base transition-colors"
            [class]="activeCategoryId() === cat.id ? 'text-primary font-semibold' : 'text-on-surface-variant hover:text-primary'"
            (click)="setCategory(cat.id)"
          >
            {{ cat.name }}
          </button>
        </li>
      }
    </ul>
  </div>

  <!-- Price Range -->
  <div class="py-unit">
    <h3 class="text-xs uppercase tracking-widest text-on-surface-variant mb-unit">Price Range</h3>
    <div class="flex items-center gap-2">
      <div class="relative flex-1">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">$</span>
        <input type="number" placeholder="Min"
          class="w-full pl-7 pr-2 py-2 bg-transparent border-0 border-b border-outline-variant text-base focus:ring-0 focus:border-primary"
          (input)="onMinPriceChange($any($event.target).value)">
      </div>
      <span class="text-outline-variant">—</span>
      <div class="relative flex-1">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">$</span>
        <input type="number" placeholder="Max"
          class="w-full pl-7 pr-2 py-2 bg-transparent border-0 border-b border-outline-variant text-base focus:ring-0 focus:border-primary"
          (input)="onMaxPriceChange($any($event.target).value)">
      </div>
    </div>
  </div>

  <!-- Sort By -->
  <div>
    <h3 class="text-xs uppercase tracking-widest text-on-surface-variant mb-unit">Sort By</h3>
    <select class="w-full border-0 border-b border-outline-variant bg-transparent py-2 text-base focus:ring-0 focus:border-primary"
      (change)="onSortChange($any($event.target).value)">
      <option value="newest">Newest Arrivals</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <!-- Quote Card -->
  <div class="hidden lg:block pt-6">
    <div class="p-6 bg-secondary-container rounded-lg">
      <p class="text-xs uppercase tracking-widest mb-unit opacity-60">Craftsmanship</p>
      <p class="text-base italic leading-relaxed text-on-secondary-container">
        "The tools we use define the boundary of our focus."
      </p>
    </div>
  </div>
</aside>
