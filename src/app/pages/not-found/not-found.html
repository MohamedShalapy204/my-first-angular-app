<main class="flex flex-col items-center justify-center min-h-[70vh] px-6 text-center">
  <div class="max-w-[36rem]">
    <!-- Large 404 Number -->
    <h1 class="text-display-lg font-display text-outline-variant mb-4 select-none">404</h1>

    <!-- Decorative Line -->
    <div class="w-16 h-0.5 bg-primary mx-auto mb-8"></div>

    <!-- Title -->
    <h2 class="text-h2 font-display mb-4">{{ translate('notFound.title') }}</h2>

    <!-- Description -->
    <p class="text-on-surface-variant text-lg leading-relaxed mb-12 max-w-[28rem] mx-auto">
      {{ translate('notFound.description') }}
    </p>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a
        routerLink="/"
        class="px-8 py-4 bg-primary text-on-primary rounded-full text-sm uppercase tracking-wider font-medium hover:opacity-90 transition-opacity"
      >
        {{ translate('notFound.backHome') }}
      </a>
      <a
        routerLink="/products"
        class="px-8 py-4 border border-outline-variant text-on-surface-variant rounded-full text-sm uppercase tracking-wider hover:border-primary hover:text-primary transition-colors"
      >
        {{ translate('notFound.browseProducts') }}
      </a>
    </div>
  </div>
</main>
