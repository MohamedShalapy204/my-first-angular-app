<div class="flex h-full items-center justify-between" role="banner">
  <!-- Brand -->
  <div 
    class="flex items-center gap-(--space-md) group cursor-pointer" 
    role="link" 
    tabindex="0" 
    aria-label="Lumina Studio Home"
  >
    <div
      class="h-9 w-9 md:h-10 md:w-10 rounded-full bg-(--bg-base) border border-(--accent)/20 flex items-center justify-center text-(--accent) transition-all duration-500 group-hover:bg-(--accent) group-hover:text-(--accent-fg) group-hover:scale-110"
      aria-hidden="true"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-4 h-4 md:w-5 md:h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 21v-2.25m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"
        />
      </svg>
    </div>
    <span class="font-serif text-(--text-h4) md:text-(--text-h3) tracking-tight text-(--fg-base)"
      >Lumina<span class="text-(--accent) italic font-light ml-0.5">Studio</span></span
    >
  </div>

  <!-- Minimal Search -->
  <div
    class="hidden lg:flex items-center gap-3 bg-(--bg-base)/40 px-5 py-2 rounded-full w-md border border-(--fg-muted)/10 focus-within:border-(--accent)/40 focus-within:bg-(--bg-base) transition-all"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-(--fg-muted)/50" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
    </svg>
    <input
      type="text"
      [placeholder]="lang() === 'ar' ? 'البحث عن الأدوات...' : 'Search gear...'"
      [attr.aria-label]="lang() === 'ar' ? 'بحث' : 'Search gear'"
      class="bg-transparent border-none outline-none text-(--text-xs) w-full text-(--fg-base) placeholder:text-(--fg-muted)/30 font-light"
    />
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-(--space-sm) md:gap-(--space-lg)">
    <!-- Language Toggle -->
    <button
      (click)="toggleLanguage()"
      [attr.aria-label]="lang() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
      class="flex items-center gap-1.5 group cursor-pointer text-(--text-xs) font-bold tracking-[0.2em] text-(--fg-muted) hover:text-(--accent) transition-all border border-(--fg-muted)/10 px-3 md:px-4 py-1.5 md:py-2 rounded-full bg-(--bg-base)/30 uppercase"
    >
      <span [class.text-(--accent)]="lang() === 'ar'">AR</span>
      <span class="w-px h-2 bg-(--fg-muted)/20" aria-hidden="true"></span>
      <span [class.text-(--accent)]="lang() === 'en'">EN</span>
    </button>

    <div class="flex items-center gap-2 md:gap-4 border-l border-(--fg-muted)/5 pl-3 md:pl-(--space-lg)">
        <button
          (click)="toggleTheme()"
          [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
          class="text-(--fg-muted) hover:text-(--accent) transition-colors p-1.5 md:p-2 rounded-full hover:bg-(--accent)/5"
        >
          @if (theme() === 'dark') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-4 h-4 md:w-5 md:h-5"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 21v-2.25m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"
              />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-4 h-4 md:w-5 md:h-5"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
              />
            </svg>
          }
        </button>
        <div 
          class="flex items-center gap-2 cursor-pointer group" 
          role="button" 
          tabindex="0" 
          aria-label="User profile settings"
        >
          <div
            class="h-8 w-8 md:h-10 md:w-10 rounded-full overflow-hidden border border-(--fg-muted)/10 group-hover:border-(--accent)/40 transition-all p-0.5 bg-(--bg-base)"
          >
            <img
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lumina"
              alt="Profile avatar"
              fetchpriority="low" decoding="async"
              class="aspect-square w-full rounded-full"
            />
          </div>
        </div>
    </div>
  </div>
</div>
