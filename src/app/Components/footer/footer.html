<div class="flex flex-col gap-(--space-2xl) py-(--space-lg)" role="contentinfo">
  <div class="flex flex-col md:flex-row justify-between items-start gap-(--space-xl)">
    <div class="max-w-xs">
      <div class="font-serif text-(--text-h2) text-(--fg-base) mb-(--space-md) italic tracking-tighter" aria-label="Lumina Brand">{{ content().brand }}</div>
      <p class="text-(--text-sm) font-light leading-relaxed text-(--fg-muted)/80 border-l border-(--accent)/20 pl-6">
        {{ content().desc }}
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-(--space-xl) md:gap-(--space-2xl)">
      <nav aria-labelledby="footer-products-heading">
        <h4 id="footer-products-heading" class="text-(--text-xs) font-bold uppercase tracking-[0.2em] text-(--accent) mb-(--space-md)">{{ content().products }}</h4>
        <ul class="space-y-(--space-sm) text-(--text-xs) font-light text-(--fg-muted)">
          <li class="hover:text-(--accent) transition-colors cursor-pointer w-fit" role="link" tabindex="0">Archive</li>
          <li class="hover:text-(--accent) transition-colors cursor-pointer w-fit" role="link" tabindex="0">Arrivals</li>
        </ul>
      </nav>
      <nav aria-labelledby="footer-support-heading">
        <h4 id="footer-support-heading" class="text-(--text-xs) font-bold uppercase tracking-[0.2em] text-(--accent) mb-(--space-md)">{{ content().support }}</h4>
        <ul class="space-y-(--space-sm) text-(--text-xs) font-light text-(--fg-muted)">
          <li class="hover:text-(--accent) transition-colors cursor-pointer w-fit" role="link" tabindex="0">Studio</li>
          <li class="hover:text-(--accent) transition-colors cursor-pointer w-fit" role="link" tabindex="0">Journal</li>
        </ul>
      </nav>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-center py-(--space-md) border-t border-(--fg-muted)/5 text-(--text-xs) font-bold uppercase tracking-[0.3em] text-(--fg-muted)/40">
    <p>{{ content().rights }}</p>
    <nav class="flex gap-(--space-lg) mt-6 sm:mt-0" aria-label="Legal navigation">
      <span class="hover:text-(--accent) transition-colors cursor-pointer" role="link" tabindex="0">{{ content().sustain }}</span>
      <span class="hover:text-(--accent) transition-colors cursor-pointer" role="link" tabindex="0">{{ content().terms }}</span>
    </nav>
  </div>
</div>
