<div class="flex flex-col gap-(--space-2xl) py-(--space-xl)" role="contentinfo">
  <div class="flex flex-col md:flex-row justify-between items-start gap-(--space-xl)">
    <div class="max-w-xs group cursor-default">
      <div class="font-serif text-(--text-h1) text-(--fg-base) mb-(--space-md) italic tracking-tighter group-hover:text-(--accent) transition-colors duration-700" aria-label="Lumina Brand">
        {{ content().brand }}<span class="text-(--brand-clay) not-italic opacity-80 decoration-slice">.</span>
      </div>
      <p class="text-(--text-sm) font-light leading-relaxed text-(--fg-muted) border-l-2 border-(--accent)/10 pl-(--space-md) hover:border-(--accent)/40 transition-colors duration-500">
        {{ content().desc }}
      </p>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-3 gap-(--space-xl) md:gap-(--space-2xl)">
      <nav aria-labelledby="footer-products-heading">
        <h4 id="footer-products-heading" class="text-[10px] font-black uppercase tracking-[0.3em] text-(--accent) mb-(--space-md) opacity-80">{{ content().products }}</h4>
        <ul class="space-y-(--space-sm) text-(--text-xs) font-medium text-(--fg-muted)/70">
          <li>
            <a class="relative inline-block hover:text-(--accent) transition-colors cursor-pointer group/link outline-none focus-visible:ring-1 focus-visible:ring-(--accent)/30 px-1 -mx-1 rounded" role="link" tabindex="0">
              <span class="relative z-10">Archive</span>
              <span class="absolute bottom-0 left-0 w-0 h-px bg-(--accent)/40 group-hover/link:w-full transition-all duration-300"></span>
            </a>
          </li>
          <li>
            <a class="relative inline-block hover:text-(--accent) transition-colors cursor-pointer group/link outline-none focus-visible:ring-1 focus-visible:ring-(--accent)/30 px-1 -mx-1 rounded" role="link" tabindex="0">
              <span class="relative z-10">Arrivals</span>
              <span class="absolute bottom-0 left-0 w-0 h-px bg-(--accent)/40 group-hover/link:w-full transition-all duration-300"></span>
            </a>
          </li>
        </ul>
      </nav>
      <nav aria-labelledby="footer-support-heading">
        <h4 id="footer-support-heading" class="text-[10px] font-black uppercase tracking-[0.3em] text-(--accent) mb-(--space-md) opacity-80">{{ content().support }}</h4>
        <ul class="space-y-(--space-sm) text-(--text-xs) font-medium text-(--fg-muted)/70">
          <li>
            <a class="relative inline-block hover:text-(--accent) transition-colors cursor-pointer group/link outline-none focus-visible:ring-1 focus-visible:ring-(--accent)/30 px-1 -mx-1 rounded" role="link" tabindex="0">
              <span class="relative z-10">Studio</span>
              <span class="absolute bottom-0 left-0 w-0 h-px bg-(--accent)/40 group-hover/link:w-full transition-all duration-300"></span>
            </a>
          </li>
          <li>
            <a class="relative inline-block hover:text-(--accent) transition-colors cursor-pointer group/link outline-none focus-visible:ring-1 focus-visible:ring-(--accent)/30 px-1 -mx-1 rounded" role="link" tabindex="0">
              <span class="relative z-10">Journal</span>
              <span class="absolute bottom-0 left-0 w-0 h-px bg-(--accent)/40 group-hover/link:w-full transition-all duration-300"></span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-center py-(--space-md) px-6 -mx-6 rounded-(--radius-lg) bg-(--brand-mist)/5 border-t border-(--fg-muted)/10 text-[10px] font-black uppercase tracking-[0.3em] text-(--fg-muted)/50">
    <p class="opacity-60">{{ content().rights }}</p>
    <nav class="flex gap-(--space-lg) mt-6 sm:mt-0" aria-label="Legal navigation">
      <a class="hover:text-(--brand-moss) transition-all cursor-pointer outline-none focus-visible:ring-1 focus-visible:ring-(--brand-moss)/30 px-1 rounded" role="link" tabindex="0">{{ content().sustain }}</a>
      <a class="hover:text-(--brand-moss) transition-all cursor-pointer outline-none focus-visible:ring-1 focus-visible:ring-(--brand-moss)/30 px-1 rounded" role="link" tabindex="0">{{ content().terms }}</a>
    </nav>
  </div>
</div>
