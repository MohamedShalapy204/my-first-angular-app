<div class="flex flex-col h-full py-(--space-lg)">
  <nav class="space-y-(--space-lg)" aria-label="Secondary navigation">
    <section aria-labelledby="collections-heading">
      <h3 id="collections-heading" class="text-(--text-h4) text-(--fg-base) mb-(--space-md) px-(--space-md)">{{ content().collections }}</h3>
      <ul class="space-y-(--space-sm)">
        <li>
          <a 
            class="flex items-center justify-between group cursor-pointer text-(--text-sm) font-light text-(--fg-muted) hover:text-(--accent) transition-colors px-(--space-md) py-2 rounded-r-full hover:bg-(--accent)/5"
            [attr.aria-label]="'Explore ' + content().audio + ' collection'"
          >
            {{ content().audio }}
            <span class="h-1 w-1 rounded-full bg-(--accent) opacity-0 group-hover:opacity-100 transition-opacity" aria-hidden="true"></span>
          </a>
        </li>
        <li>
          <a 
            class="flex items-center justify-between group cursor-pointer text-(--text-sm) font-light text-(--fg-muted) hover:text-(--accent) transition-colors px-(--space-md) py-2 rounded-r-full hover:bg-(--accent)/5"
            [attr.aria-label]="'Explore ' + content().workspace + ' collection'"
          >
            {{ content().workspace }}
            <span class="h-1 w-1 rounded-full bg-(--accent) opacity-0 group-hover:opacity-100 transition-opacity" aria-hidden="true"></span>
          </a>
        </li>
        <li>
          <a 
            class="flex items-center justify-between group cursor-pointer text-(--text-sm) text-(--accent) font-medium px-(--space-md) py-2 bg-(--accent)/5 rounded-r-full"
            [attr.aria-label]="'Currently viewing ' + content().ergo + ' collection'"
            aria-current="page"
          >
            {{ content().ergo }}
            <span class="h-1 w-1 rounded-full bg-(--accent)" aria-hidden="true"></span>
          </a>
        </li>
      </ul>
    </section>

    <section class="mt-(--space-xl) px-(--space-md)" aria-labelledby="discovery-heading">
      <h3 id="discovery-heading" class="font-serif text-(--text-base) text-(--fg-base) mb-(--space-md)">{{ content().discovery }}</h3>
      <ul class="space-y-(--space-md)">
        <li class="group cursor-pointer">
          <div class="flex items-center gap-(--space-md)" role="link" tabindex="0" [attr.aria-label]="'View ' + content().product">
            <div class="h-12 w-12 rounded-(--radius-md) bg-(--bg-base) border border-(--fg-muted)/10 p-1 group-hover:border-(--accent)/30 transition-all overflow-hidden shadow-sm">
               <img 
                 src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&q=80&w=100" 
                 alt="Preview of the latest studio furniture"
                 loading="lazy" decoding="async"
                 class="w-full h-full object-cover rounded-sm" 
               />
            </div>
            <div>
              <p class="text-(--text-xs) uppercase tracking-widest text-(--fg-muted)/50">{{ content().latest }}</p>
              <p class="text-(--text-sm) font-medium text-(--fg-base) group-hover:text-(--accent) transition-colors">{{ content().product }}</p>
            </div>
          </div>
        </li>
      </ul>
    </section>
  </nav>

  <div class="mt-auto px-(--space-md) pt-(--space-lg)">
    <div class="p-(--space-md) rounded-(--radius-2xl) bg-(--bg-base) border border-(--fg-muted)/5 text-center shadow-inner">
      <p class="text-(--text-xs) font-serif italic text-(--fg-muted) mb-(--space-md) leading-relaxed">{{ content().quote }}</p>
      <button 
        class="text-(--text-xs) font-bold uppercase tracking-widest text-(--accent) border-b border-transparent hover:border-(--accent) transition-all"
        aria-label="Join the Curated Weekly newsletter"
      >
        {{ content().cta }}
      </button>
    </div>
  </div>
</div>
