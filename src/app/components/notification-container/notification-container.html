@for (n of notificationService.notifications(); track n.id) {
  <div
    class="notification-card relative min-w-[320px] max-w-md p-5 rounded-2xl border bg-(--surface)/80 backdrop-blur-xl shadow-2xl flex items-center justify-between gap-4 transition-all duration-500 hover:shadow-emerald-500/10"
    [class]="getTypeClass(n.type)"
    (mouseenter)="notificationService.pause(n.id)"
    (mouseleave)="notificationService.resume(n.id)"
  >
    <div class="flex items-center gap-4">
      <!-- Dynamic Glow based on type -->
      <div
        class="w-2.5 h-2.5 rounded-full shrink-0 shadow-[0_0_12px_rgba(0,0,0,0.2)]"
        [style.backgroundColor]="'var(--' + (n.type === 'loading' ? 'info' : n.type) + ')'"
        [style.boxShadow]="'0 0 15px var(--' + (n.type === 'loading' ? 'info' : n.type) + ')'"
      ></div>
      <span class="text-sm font-semibold tracking-tight text-(--on-surface)">
        {{ n.message }}
      </span>
    </div>
    <button
      (click)="notificationService.dismiss(n.id)"
      class="text-(--on-surface-variant) hover:text-(--on-surface) hover:rotate-90 transition-all duration-300 shrink-0 p-1"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <!-- The Overdrive Timer Bar -->
    @if (n.type !== 'loading') {
      <div class="timer-bar" [style.animationDuration.ms]="n.duration"></div>
    }
  </div>
}
