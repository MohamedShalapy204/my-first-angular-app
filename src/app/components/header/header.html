<div class="flex h-full items-center justify-between" role="banner">
  <!-- Brand -->
  <div
    class="flex items-center gap-(--space-sm) group cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-(--accent)/30 rounded-full pr-4 transition-all"
    role="link"
    tabindex="0"
    aria-label="Lumina Studio Home"
  >
    <a
      routerLink="/"
      class="h-9 w-9 md:h-10 md:w-10 rounded-full bg-(--bg-base) border border-(--accent)/20 flex items-center justify-center text-(--accent) transition-all duration-500 group-hover:bg-(--brand-moss) group-hover:text-(--accent-fg) group-hover:scale-115 group-active:scale-90 shadow-md group-hover:shadow-(--brand-moss)/30 focus:outline-none focus:ring-2 focus:ring-(--accent)/30"
      aria-label="Lumina Studio Home"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.8"
        stroke="currentColor"
        class="w-4 h-4 md:w-5 md:h-5 transition-transform duration-700 group-hover:rotate-180"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 21v-2.25m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"
        />
      </svg>
    </a>
    <span
      class="font-serif text-(--text-h4) md:text-(--text-h3) tracking-tight text-(--fg-base) select-none"
      >Lumina<span class="text-(--accent) italic font-light ml-1">Studio</span></span
    >
  </div>

  <!-- Minimal Search -->
  <div
    class="group/search hidden lg:flex items-center gap-3 bg-(--bg-base)/40 px-5 py-2 rounded-full w-md border border-(--fg-muted)/10 focus-within:border-(--accent)/40 focus-within:bg-(--bg-base) focus-within:shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-300"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.8"
      stroke="currentColor"
      class="w-4 h-4 text-(--fg-muted)/40 group-focus-within/search:text-(--accent) transition-colors duration-300"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
      />
    </svg>
    <input
      type="text"
      routerLink="/search"
      [placeholder]="lang() === 'ar' ? 'البحث عن المنتجات...' : 'Search products...'"
      [attr.aria-label]="lang() === 'ar' ? 'بحث' : 'Search products'"
      class="bg-transparent border-none outline-none text-(--text-sm) w-full text-(--fg-base) placeholder:text-(--fg-muted)/40 placeholder:font-light font-light tracking-wide cursor-pointer"
    />
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-(--space-sm) md:gap-(--space-md)">
    <!-- Language Toggle -->
    <button
      (click)="toggleLanguage()"
      [attr.aria-label]="lang() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
      class="flex items-center gap-1.5 group cursor-pointer text-(--text-xs) font-bold tracking-[0.15em] text-(--fg-muted) hover:text-(--accent) transition-all border border-(--fg-muted)/10 px-3 md:px-5 py-2 md:py-2.5 rounded-full bg-(--bg-base)/20 hover:bg-(--bg-base) hover:border-(--accent)/20 uppercase active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--accent)/30"
    >
      <span [class.text-(--brand-moss)]="lang() === 'ar'" class="transition-colors">AR</span>
      <span
        class="w-px h-2.5 bg-(--fg-muted)/10 group-hover:bg-(--brand-moss)/20 transition-colors"
        aria-hidden="true"
      ></span>
      <span [class.text-(--brand-moss)]="lang() === 'en'" class="transition-colors">EN</span>
    </button>

    <div
      class="flex items-center gap-2 md:gap-3 border-l border-(--fg-muted)/10 pl-3 md:pl-(--space-md)"
    >
      <button
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
        class="text-(--fg-muted) hover:text-(--accent) transition-all p-2 md:p-2.5 rounded-full hover:bg-(--accent)/5 active:scale-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--accent)/30"
      >
        <div class="relative w-4 h-4 md:w-5 md:h-5">
          @if (theme() === 'dark') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.8"
              stroke="currentColor"
              class="w-full h-full animate-in fade-in zoom-in duration-300"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 21v-2.25m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591M16.5 12a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"
              />
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.8"
              stroke="currentColor"
              class="w-full h-full animate-in fade-in zoom-in spin-in-12 duration-300"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
              />
            </svg>
          }
        </div>
      </button>
      <div
        class="flex items-center gap-2 cursor-pointer group focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-(--accent)/30 rounded-full"
        role="button"
        tabindex="0"
        aria-label="User profile settings"
      >
        <div
          class="h-8 w-8 md:h-10 md:w-10 rounded-full overflow-hidden border border-(--fg-muted)/10 group-hover:border-(--accent)/40 transition-all p-0.5 bg-(--bg-base) group-active:scale-95"
        >
          <img
            src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lumina"
            alt="Profile avatar"
            fetchpriority="low"
            decoding="async"
            class="aspect-square w-full rounded-full transition-all group-hover:scale-110"
          />
        </div>
      </div>
    </div>
  </div>
</div>
