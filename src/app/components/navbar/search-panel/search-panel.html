<!-- Backdrop -->
@if (isOpen()) {
  <div
    data-backdrop
    class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm transition-opacity"
    (click)="onBackdropClick($event)"
  ></div>
}

<!-- Search Panel -->
<div
  class="fixed top-20 inset-x-0 z-50 bg-surface/95 backdrop-blur-md border-b border-outline/10 shadow-lg transition-all duration-300 ease-out"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()"
  [class.-translate-y-full]="!isOpen()"
  [class.opacity-100]="isOpen()"
  [class.translate-y-0]="isOpen()"
  role="dialog"
  aria-modal="true"
  aria-label="Search"
>
  <div class="max-w-[1440px] mx-auto px-4 py-4">
    <div class="relative">
      <span
        class="material-symbols-outlined absolute start-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
      >
        search
      </span>
      <input
        #searchInput
        type="search"
        class="w-full bg-surface-container rounded-full py-3 ps-12 pe-4 text-on-surface placeholder:text-on-surface-variant border border-outline/20 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-colors"
        [placeholder]="translate('nav.search')"
        (keydown.escape)="close()"
      />
      <button
        (click)="close()"
        class="absolute end-3 top-1/2 -translate-y-1/2 flex items-center justify-center w-8 h-8 rounded-full hover:bg-surface-container-high transition-colors"
        aria-label="Close search"
      >
        <span class="material-symbols-outlined text-on-surface-variant">close</span>
      </button>
    </div>
  </div>
</div>
