<a
  href="#main-content"
  class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:bg-primary focus:text-on-primary focus:px-4 focus:py-2 focus:rounded"
>
  Skip to content
</a>
<header
  class="top-0 sticky z-50 bg-surface/90 backdrop-blur-md border-b border-outline/10 h-20 flex justify-between items-center px-padding-sm md:px-padding-desktop max-w-[1440px] mx-auto transition-colors duration-500"
>
  <div class="flex items-center gap-[var(--spacing-lg)]">
    <!-- Hamburger Button -->
    <button
      class="md:hidden flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors"
      (click)="toggleSidebar()"
      aria-label="Open navigation menu"
    >
      <span class="material-symbols-outlined text-on-surface">menu</span>
    </button>

    <a
      class="font-display text-h3 font-medium tracking-tighter text-on-surface hover:text-primary transition-colors"
      routerLink="/"
    >
      STUDIO
    </a>
    <nav class="hidden md:flex gap-[var(--spacing-md)]">
      <a
        class="text-primary font-bold border-b border-primary text-sm font-semibold tracking-wide cursor-pointer transition-opacity active:opacity-70"
        routerLink="/products"
      >
        {{ translate('nav.shop') }}
      </a>
      <a
        class="text-secondary text-sm tracking-wide hover:text-primary transition-colors duration-300 cursor-pointer active:opacity-70"
        routerLink="/products"
      >
        {{ translate('nav.story') }}
      </a>
    </nav>
  </div>

  <div class="flex items-center gap-[var(--spacing-base)]">
    <!-- Desktop Search -->
    <div class="hidden md:block relative">
      <span
        class="material-symbols-outlined absolute end-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
      >
        search
      </span>
      <input
        class="bg-transparent border-0 border-b border-outline-variant py-1 pe-10 focus:ring-0 focus:border-primary text-sm placeholder:text-outline-variant transition-colors"
        [placeholder]="translate('nav.search')"
        type="text"
      />
    </div>

    <!-- Mobile Search Toggle -->
    <button
      class="md:hidden flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleSearch()"
      aria-label="Toggle search"
    >
      <span class="material-symbols-outlined text-primary">search</span>
    </button>

    <!-- Cart with Badge (hidden on mobile, bottom-tabs shows cart) -->
    <a
      routerLink="/cart"
      class="hidden md:flex relative items-center cursor-pointer transition-opacity active:opacity-70"
      aria-label="Shopping bag"
    >
      <span class="material-symbols-outlined text-primary">shopping_bag</span>
      @if (cartCount() > 0) {
        <span
          data-cart-badge
          class="absolute -top-1 -end-1 bg-tertiary text-on-tertiary text-xs font-bold rounded-full min-w-[1.25rem] h-5 flex items-center justify-center px-1"
        >
          {{ cartCount() }}
        </span>
      }
    </a>

    <!-- Auth Actions (hidden on mobile, mobile-menu handles auth) -->
    @if (isAuthenticated()) {
      <a
        routerLink="/profile"
        class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Profile"
      >
        <span class="material-symbols-outlined text-primary">person</span>
      </a>

      <button
        class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
        (click)="logout()"
        aria-label="Logout"
      >
        <span class="material-symbols-outlined text-primary">logout</span>
      </button>
    } @else {
      <a
        routerLink="/login"
        class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Login"
      >
        <span class="material-symbols-outlined text-primary">login</span>
      </a>
      <a
        routerLink="/register"
        class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Register"
      >
        <span class="material-symbols-outlined text-primary">person_add</span>
      </a>
    }

    <!-- Theme Toggle (hidden on mobile, mobile-menu handles settings) -->
    <button
      class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
    >
      <span class="material-symbols-outlined text-primary">
        {{ theme() === 'light' ? 'dark_mode' : 'light_mode' }}
      </span>
    </button>

    <!-- Language Toggle (hidden on mobile, mobile-menu handles settings) -->
    <button
      class="hidden md:flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleLang()"
      [attr.aria-label]="lang() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
    >
      <span class="material-symbols-outlined text-primary">translate</span>
    </button>
  </div>
</header>

<!-- Search Panel (mobile only) -->
<app-search-panel [isOpen]="isSearchOpen()" (closed)="isSearchOpen.set(false)" />

<!-- Bottom Tabs (mobile only) -->
<app-bottom-tabs />
