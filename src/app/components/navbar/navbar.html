<header
  class="top-0 sticky z-50 bg-surface/90 backdrop-blur-md border-b border-outline/10 h-20 flex justify-between items-center px-padding-desktop max-w-[1440px] mx-auto transition-colors duration-500"
>
  <div class="flex items-center gap-12">
    <a
      class="font-display text-h3 font-medium tracking-tighter text-on-surface hover:text-primary transition-colors"
      routerLink="/"
    >
      STUDIO
    </a>
    <nav class="hidden md:flex gap-8">
      <a
        class="text-primary font-bold border-b border-primary text-sm font-semibold tracking-wide cursor-pointer transition-opacity active:opacity-70"
        routerLink="/products"
      >
        {{ translate('nav.shop') }}
      </a>
      <a
        class="text-secondary text-sm tracking-wide hover:text-primary transition-colors duration-300 cursor-pointer active:opacity-70"
        routerLink="/products"
      >
        {{ translate('nav.story') }}
      </a>
    </nav>
  </div>

  <div class="flex items-center gap-6">
    <div class="hidden md:block relative">
      <span
        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none"
      >
        search
      </span>
      <input
        class="bg-transparent border-0 border-b border-outline-variant py-1 pr-10 focus:ring-0 focus:border-primary text-sm placeholder:text-outline-variant transition-colors"
        [placeholder]="translate('nav.search')"
        type="text"
      />
    </div>

    <button
      class="md:hidden flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleSearch()"
      aria-label="Toggle search"
    >
      <span class="material-symbols-outlined text-primary">search</span>
    </button>

    <a
      routerLink="/cart"
      class="flex items-center cursor-pointer transition-opacity active:opacity-70"
      aria-label="Shopping bag"
    >
      <span class="material-symbols-outlined text-primary">shopping_bag</span>
    </a>

    @if (isAuthenticated()) {
      <!-- Authenticated: Show profile + logout -->
      <a
        routerLink="/profile"
        class="flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Profile"
      >
        <span class="material-symbols-outlined text-primary">person</span>
      </a>

      <button
        class="flex items-center cursor-pointer transition-opacity active:opacity-70"
        (click)="logout()"
        aria-label="Logout"
      >
        <span class="material-symbols-outlined text-primary">logout</span>
      </button>
    } @else {
      <!-- Guest: Show login + register -->
      <a
        routerLink="/login"
        class="flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Login"
      >
        <span class="material-symbols-outlined text-primary">login</span>
      </a>
      <a
        routerLink="/register"
        class="flex items-center cursor-pointer transition-opacity active:opacity-70"
        aria-label="Register"
      >
        <span class="material-symbols-outlined text-primary">person_add</span>
      </a>
    }

    <button
      class="flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
    >
      <span class="material-symbols-outlined text-primary">
        {{ theme() === 'light' ? 'dark_mode' : 'light_mode' }}
      </span>
    </button>

    <button
      class="flex items-center cursor-pointer transition-opacity active:opacity-70"
      (click)="toggleLang()"
      [attr.aria-label]="lang() === 'en' ? 'Switch to Arabic' : 'Switch to English'"
    >
      <span class="material-symbols-outlined text-primary">translate</span>
    </button>
  </div>
</header>
