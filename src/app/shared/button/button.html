@if (link()) {
  <a
    [routerLink]="link()"
    [class]="classes()"
    [attr.aria-label]="ariaLabel() || null"
  >
    <ng-content />
  </a>
} @else {
  <button
    [class]="classes()"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel() || null"
    [attr.aria-disabled]="disabled() || null"
  >
    <ng-content />
  </button>
}
