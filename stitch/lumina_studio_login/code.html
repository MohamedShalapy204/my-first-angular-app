<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login | Lumina Studio</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary-fixed": "#1c1c19",
                    "surface-tint": "#56642b",
                    "secondary": "#5f5e5b",
                    "inverse-surface": "#303030",
                    "tertiary": "#a93700",
                    "secondary-fixed": "#e5e2dd",
                    "error": "#ba1a1a",
                    "surface": "#fcf9f8",
                    "background": "#fcf9f8",

            "spacing": {

                    "margin-desktop": "64px",
                    "gutter": "24px",
                    "container-max": "1440px",
                    "section-gap": "120px",
                    "margin-mobile": "20px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Playfair Display"],
                    "headline-lg": ["Playfair Display"],
                    "body-md": ["Public Sans"],
                    "label-md": ["Public Sans"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .hero-image-frame {
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }
        input:focus {
            outline: none;
            border-color: #56642b !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Left Side: Editorial Photography (Visible on MD+) -->
<section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden bg-surface-container-low">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-90 transition-transform duration-[10000ms] hover:scale-110" data-alt="A high-end editorial shot of a minimalist photography studio. The scene features clean concrete floors, a single vintage leather chair, and a large black metal camera tripod standing against a soft bone-colored wall. The lighting is soft and directional, creating long elegant shadows. The overall aesthetic is one of quiet luxury and professional intentionality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5l-Qrm34IIb4wDwH5nYMiSKnsNzwxxRUgQw5vlRbi5UrdLR1xb_x83YLr1rXuFnm4QGReXlZUTEdZS7aztu2Je7_J-RgkucZi4cUdVU0TbY2Gd13fiK_RGnI6cCiHK3CDPOz0O4Dy0W-2gZHHBzVFJThoExJBSKXWi_HhlWDgwE3GpCUQr82AlcJ3IhPPdasSHOOvaY4qx7WaELfAU59QhcrWZ2uEPKxKuSFea3DqbvTGzwfXHdzrLg4Qwg418hPvcG8q2U_9ifTK">
</div>
<!-- Branded Overlay -->
<div class="relative z-10 flex flex-col justify-between p-margin-desktop w-full h-full text-inverse-on-surface bg-on-background/10 backdrop-blur-[2px]">
<div class="font-headline-lg text-headline-lg tracking-tight">
                    Lumina Studio
                </div>
<div class="max-w-md">
<p class="font-headline-md text-headline-md italic mb-4 opacity-90">"Crafting light into legacy."</p>
<p class="font-body-md text-body-md opacity-70 leading-relaxed">
                        Join an elite community of digital craftsmen where intentionality meets artistic excellence.
                    </p>
</div>
</div>
</section>
<!-- Right Side: Authentication Canvas -->
<section class="flex-1 flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-background">
<div class="w-full max-w-[420px] space-y-10">
<!-- Brand Mobile Header -->
<div class="md:hidden text-center mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-on-background">Lumina Studio</h1>
</div>
<!-- Header -->
<header class="space-y-2">
<h2 class="font-headline-lg text-headline-lg text-on-background">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant">Access your curated studio workspace.</p>
</header>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2 group">
<label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors" for="email">
                            Email Address
                        </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 font-body-md text-on-background placeholder:text-outline-variant transition-all duration-300 focus:border-primary" id="email" placeholder="name@lumina.studio" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2 group">
<div class="flex justify-between items-end">
<label class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors" for="password">
                                Password
                            </label>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-4 px-0 font-body-md text-on-background placeholder:text-outline-variant transition-all duration-300 focus:border-primary" id="password" placeholder="••••••••" type="password">
<button class="absolute right-0 bottom-4 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full bg-on-background text-surface py-5 px-unit rounded-full font-label-md text-label-md hover:bg-primary transition-all duration-300 active:scale-[0.98] shadow-sm">
                            Sign In
                        </button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline-variant uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Secondary Actions -->
<div class="space-y-4">
<button class="w-full border border-outline-variant text-on-background py-4 px-unit rounded-full font-label-md text-label-md flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-200">
<!-- Simulated Google Icon without SVG code -->
<span class="w-5 h-5 rounded-full border border-outline-variant flex items-center justify-center text-[10px] font-bold">G</span>
                        Continue with Google
                    </button>
</div>
<!-- Footer Link -->
<footer class="text-center pt-8">
<p class="font-body-md text-on-surface-variant">
                        New to Lumina? 
                        <a class="text-on-background font-semibold underline underline-offset-4 hover:text-primary transition-colors" href="#">Create an Account</a>
</p>
</footer>
</div>
</section>
</main>
<!-- Simple Atmospheric Fade In -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('opacity-0');
            setTimeout(() => {
                document.body.classList.remove('opacity-0');
                document.body.classList.add('transition-opacity', 'duration-1000', 'opacity-100');
            }, 100);
        });
    </script>
</body></html>
